{% extends "base.html" %}
{% block title %}Write Post — Faseel Infosec{% endblock %}
{% block content %}
<style>
  .form-card { background: #1e293b; border-radius: 12px; padding: 32px; border: 1px solid #334155; max-width: 800px; }
  .form-card h1 { font-size: 20px; margin-bottom: 24px; color: #f1f5f9; }
  label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; margin-top: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type=text], select, textarea { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 13px; outline: none; }
  input[type=text]:focus, select:focus, textarea:focus { border-color: #3b82f6; }
  select option { background: #1e293b; }
  .submit-btn { margin-top: 24px; padding: 12px 32px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; }
  .submit-btn:hover { background: #2563eb; }
</style>

<div class="form-card">
  <h1>✏️ Write New Blog Post</h1>
  <form method="POST" action="/blog/new">
    <label>Post Title</label>
    <input type="text" name="title" placeholder="Enter a compelling title..." required>

    <label>Category</label>
    <select name="category">
      <option>Threat Intelligence</option>
      <option>Security News</option>
      <option>ISO 27001</option>
      <option>Security Research</option>
      <option>Enterprise Security</option>
      <option>Cybersecurity</option>
      <option>Security Tools</option>
      <option>Faseel Infosec</option>
    </select>

    <label>Summary (shown on blog listing)</label>
    <textarea name="summary" rows="3" placeholder="Brief summary of the article..."></textarea>

    <label>Full Content</label>
    <textarea name="content" rows="15" placeholder="Write your full article here..."></textarea>

    <label>Tags (comma separated)</label>
    <input type="text" name="tags" placeholder="e.g. ISO 27001, Risk Management, Phishing">

    <label>Source URL (optional)</label>
    <input type="text" name="source_url" placeholder="https://...">

    <button type="submit" class="submit-btn">Publish Post</button>
  </form>
</div>
{% endblock %}
